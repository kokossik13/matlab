// ═══════════════════

// ═══════════════════
var TOPICS = {
  sat: [{id:'algebra',l:'Algebra'},{id:'linear',l:'Linear Eq.'},{id:'quadratic',l:'Quadratic'},{id:'percent',l:'Percent'},{id:'ratio',l:'Ratio & Rates'},{id:'stats',l:'Statistics'}],
  gcse: [{id:'algebra',l:'Algebra'},{id:'linear',l:'Linear Eq.'},{id:'quadratic',l:'Quadratic'},{id:'percent',l:'Percent'},{id:'geo',l:'Geometry'},{id:'stats',l:'Statistics'}],
  ap: [{id:'limits',l:'Limits'},{id:'derivatives',l:'Derivatives'},{id:'integrals',l:'Integrals'},{id:'quadratic',l:'Polynomials'},{id:'algebra',l:'Algebra'}]

// ═══════════════════
// HELPERS
// ═══════════════════
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(n){return Math.round(n*100)/100;}
function gcd(a,b){return b ? gcd(b,a%b) : a;}

// ═══════════════════
// GENERATORS — ТОЛЬКО algebra + limits (остальное пока отключено)
// ═══════════════════
var GEN = {
  algebra: {
    1: function() {
      let x = rnd(-15,15);
      let a = rnd(2,9);
      let b = rnd(-20,20);
      if (b===0) b = rnd(5,25)*(rnd(0,1)?1:-1);
      let c = a*x + b;
      let bs = b>=0 ? ' + ' + b : ' − ' + Math.abs(b);
      return {
        q: `Solve for x: <span class="mth">${a}x${bs} = ${c}</span>`,
        ans: x,
        diff:1,
        tag:'Algebra',
        concept:'To isolate x: move the constant to the right (flip sign), then divide.',
        hint:`Move ${b} to the right, then divide by ${a}`,
        steps:[{t:`${a}x = ${c-b}`, e:'Constant moved — sign flipped.'},{t:`x = ${x}`, e:'Divided by coefficient.'}]
      };
    },
    2: function() {
      let x = rnd(-12,12);
      let a = rnd(2,7);
      let b = rnd(-9,9);
      let c = rnd(1,8);
      if (c===a) c = a+1;
      let fin = a*(x+b) - c*x;
      let bs = b>=0 ? ' + ' + b : ' − ' + Math.abs(b);
      return {
        q: `Solve: <span class="mth">${a}(x${bs}) = ${c}x + ${fin}</span>`,
        ans: x,
        diff:2,
        tag:'Algebra',
        concept:'Expand brackets, collect like terms.',
        hint:`Expand: ${a}x ${a*b>=0 ? '+' : '−'} ${Math.abs(a*b)}`,
        steps:[{t:`${a}x ${a*b>=0 ? '+' : '−'} ${Math.abs(a*b)} = ${c}x + ${fin}`, e:'Expanded.'},{t:`${a-c}x = ${fin-a*b}`, e:'Collected terms.'},{t:`x = ${x}`, e:'Divided.'}]
      };
    },
    3: function() {
      let a = rnd(2,8), b = rnd(2,8);
      while(a===b) b=rnd(2,8);
      let k = rnd(1,5);
      let c = k*(a+b);
      let ans = k*a*b;
      let lcm = a*b / gcd(a,b);
      return {
        q: `Solve: <span class="mth">x/${a} + x/${b} = ${c}</span>`,
        ans: ans,
        diff:3,
        tag:'Algebra',
        concept:'Multiply by LCM to clear fractions.',
        hint:`LCM(${a},${b}) = ${lcm}`,
        steps:[{t:`×${lcm}: ${(lcm/a)}x + ${(lcm/b)}x = ${c*lcm}`, e:'Fractions gone.'},{t:`x = ${ans}`, e:'Solved.'}]
      };
    }
  },

  limits: {
    1: function() {
      const type = rnd(1,6);
      if (type === 1) {
        let a = rnd(2,8); let b = rnd(-15,15); let c = rnd(-6,6);
        let ans = a*c + b;
        let sign = b >= 0 ? ' + ' : ' − ';
        return { q: `Evaluate: \\lim_{x \\to ${c}} (${a}x${sign}${Math.abs(b)})`, ans: ans, diff:1, tag:'Limits',
          concept:'Предел полинома — просто подстановка.', hint:`Подставь x = ${c}`,
          steps:[{t:`${a}·${c}${sign}${Math.abs(b)} = ${ans}`, e:'Прямая подстановка.'}] };
      }
      if (type === 2) {
        let k = rnd(-30,30); let c = rnd(-5,5);
        return { q: `Evaluate: \\lim_{x \\to ${c}} ${k}`, ans: k, diff:1, tag:'Limits',
          concept:'Предел константы = сама константа.', hint:'x не влияет',
          steps:[{t:`Ответ = ${k}`, e:''}] };
      }
      if (type === 3) {
        let n = rnd(2,7); let d = rnd(1,5); let c = rnd(-4,4);
        let ans = (n*c)/d;
        return { q: `Evaluate: \\lim_{x \\to ${c}} \\frac{${n}x}{${d}}`, ans: ans, diff:1, tag:'Limits',
          concept:'Подстановка в числитель и знаменатель.', hint:`\\frac{${n}·${c}}{${d}}`,
          steps:[{t:`= ${ans}`, e:'Знаменатель ≠ 0'}] };
      }
      if (type === 4) {
        let c = rnd(-3,3); let left = rnd(-10,10); let right = rnd(-10,10);
        let ans = (c >= 0) ? right : left;
        return { q: `f(x) = { ${left} если x < 0 | ${right} если x ≥ 0 }<br>Evaluate lim x→${c} f(x)`, ans: ans, diff:1, tag:'Limits',
          concept:'Предел зависит от поведения около точки.', hint:`С какой стороны?`,
          steps:[{t:`x → ${c} → ${ans}`, e:''}] };
      }
      if (type === 5) {
        let v = rnd(50,120); let t = rnd(2,6); let dist = v*t;
        return { q: `Машина едет ${v} км/ч. Расстояние за ${t} ч?`, ans: dist, diff:1, tag:'Limits',
          concept:'Предел здесь = просто значение функции.', hint:'Скорость × время',
          steps:[{t:`${v} × ${t} = ${dist}`, e:''}] };
      }
      return { q: `Evaluate: \\lim_{x \\to 0} \\frac{\\sin x}{x}`, ans: 1, diff:1, tag:'Limits',
        concept:'Классический предел = 1.', hint:'Запомни это значение',
        steps:[{t:'= 1', e:'Стандартный результат'}] };
    },
    2: function() {
      var a = rnd(1,4), ans = 2*a;
      return {q:'Evaluate: <span class="mth">lim<sub>x→'+a+'</sub> (x² − '+a*a+') / (x − '+a+')</span>', ans:ans, diff:2, tag:'Limits'};
    },
    3: function() {
      var a = rnd(2,6), ans = 0;
      return {q:'Evaluate: <span class="mth">lim<sub>x→∞</sub> '+a+' / x</span>', ans:ans, diff:3, tag:'Limits'};
    }
  }
};
